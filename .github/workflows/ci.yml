name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Verify MSW v2 compliance
        run: |
          echo "Verifying MSW v2 compliance..."
          node src/test/verify-msw-v2.mjs
          npm ls msw

      - name: Unit tests (Vitest)
        run: npx vitest run --config vitest.config.ts
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Hard gate: fails the build if any sitemap URL renders the Not Found page
      # (an orphan URL with no real route, e.g. the /courses soft-404). Runs after
      # Build (needs dist + sitemap) and Playwright install (needs chromium).
      - name: Route guard (soft-404 check)
        run: npm run check:routes

      # continue-on-error: E2E tests check for content (e.g. testimonials)
      # that only renders when Supabase returns data. CI has no live DB
      # connection, so these will fail until we add seed data or mocks.
      - name: E2E tests (Playwright)
        run: npx playwright test
        continue-on-error: true

      - name: BDD smoke tests
        run: npm run bdd:smoke
        continue-on-error: true

      - name: Upload Vitest results
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('coverage/**') != ''
        with:
          name: vitest-results
          path: coverage/
          retention-days: 30

      - name: Upload Playwright results
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('test-results/**') != ''
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - name: Upload BDD results
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('reports/**') != ''
        with:
          name: bdd-cucumber-results
          path: |
            reports/
            screenshots/
          retention-days: 30

  # The Next site (apps/web) is a separate npm project (own lockfile) and the public
  # SEO/lead-gen surface. Without this job a broken Next build or type error only
  # surfaces when Vercel fails AFTER merge. Runs in parallel with the SPA job above.
  web-next:
    name: Next site (apps/web)
    runs-on: ubuntu-latest

    env:
      # Same Supabase project as the SPA; Next reads the NEXT_PUBLIC_ names. Pages are
      # dynamic so the build does not fetch, but provide them to match production.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      # Resolves the committed @altogether/ui (file:../../packages/ui) from the checkout.
      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Lint
        run: npm run lint
        working-directory: apps/web

      # next build gates on TypeScript + ESLint errors and compiles every route.
      - name: Build (type-check + build)
        run: npm run build
        working-directory: apps/web
