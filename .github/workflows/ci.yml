name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Verify MSW v2 compliance
        run: |
          echo "Verifying MSW v2 compliance..."
          node src/test/verify-msw-v2.mjs
          npm ls msw

      - name: Unit tests (Vitest)
        run: npx vitest run --config vitest.config.ts
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # continue-on-error: E2E tests check for content (e.g. testimonials)
      # that only renders when Supabase returns data. CI has no live DB
      # connection, so these will fail until we add seed data or mocks.
      - name: E2E tests (Playwright)
        run: npx playwright test
        continue-on-error: true

      - name: BDD smoke tests
        run: npm run bdd:smoke
        continue-on-error: true

      - name: Upload Vitest results
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('coverage/**') != ''
        with:
          name: vitest-results
          path: coverage/
          retention-days: 30

      - name: Upload Playwright results
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('test-results/**') != ''
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - name: Upload BDD results
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('reports/**') != ''
        with:
          name: bdd-cucumber-results
          path: |
            reports/
            screenshots/
          retention-days: 30
