<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" width="100%" role="img">
  <title>Altogether Agile horizontal lockup</title>
  <desc>Horizontal lockup with the Deep Teal hanko mark on the left and the Altogether Agile wordmark stacked on the right.</desc>
  <rect width="100" height="100" fill="#004D4D"/>
  <text x="50" y="83.5"
        text-anchor="middle"
        font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif"
        font-weight="700"
        font-size="86"
        fill="#FF9715">皆</text>
  <text x="120" y="42"
        font-family="'DM Sans', system-ui, sans-serif"
        font-weight="800"
        font-size="32"
        letter-spacing="3"
        fill="#004D4D">ALTOGETHER</text>
  <text x="120" y="80"
        font-family="'DM Sans', system-ui, sans-serif"
        font-weight="800"
        font-size="32"
        letter-spacing="3"
        fill="#FF9715">AGILE</text>
</svg>
