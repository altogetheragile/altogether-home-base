  <rect x="90" y="0" width="100" height="100" fill="#004D4D"/>
  <text x="140" y="83.5"
        text-anchor="middle"
        font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif"
        font-weight="700"
        font-size="86"
        fill="#FF9715">皆</text>
  <text x="140" y="145"
        text-anchor="middle"
        font-family="'DM Sans', system-ui, sans-serif"
        font-weight="800"
        font-size="22"
        letter-spacing="3"
        fill="#004D4D">ALTOGETHER</text>
  <text x="140" y="178"
        text-anchor="middle"
        font-family="'DM Sans', system-ui, sans-serif"
        font-weight="800"
        font-size="22"
        letter-spacing="3"
        fill="#FF9715">AGILE</text>
</svg>
