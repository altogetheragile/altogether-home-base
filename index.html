
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta name="description" content="Expert agile coaching, training, and transformation services to help your organization achieve sustainable success through collaborative practices." />
    <meta name="author" content="AltogetherAgile" />

    <meta property="og:title" content="AltogetherAgile - Agile Coaching & Training" />
    <meta property="og:description" content="Expert agile coaching, training, and transformation services to help your organization achieve sustainable success through collaborative practices." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@altogetheragile" />
    <meta name="twitter:image" content="https://www.altogetheragile.com/og-image.png" />
    
    <!-- Critical fonts (self-hosted, no render-blocking external request) -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/dm-sans-latin.woff2" crossorigin>
    <style>
      @font-face { font-family: 'DM Sans'; font-style: normal; font-weight: 400 700; font-display: swap; src: url(/fonts/dm-sans-latin.woff2) format('woff2'); }
      @font-face { font-family: 'DM Serif Display'; font-style: normal; font-weight: 400; font-display: swap; src: url(/fonts/dm-serif-display-latin.woff2) format('woff2'); }
      @font-face { font-family: 'DM Serif Display'; font-style: italic; font-weight: 400; font-display: swap; src: url(/fonts/dm-serif-display-italic-latin.woff2) format('woff2'); }
    </style>
    <!-- Additional fonts (page editor) - loaded async to avoid render blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;600;700&family=Lato:wght@300;400;700&family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@400;700&family=Merriweather:wght@300;400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;600;700&family=Lato:wght@300;400;700&family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@400;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet"></noscript>
  </head>

  <body>
    <div id="root">
      <!-- Critical shell: visible instantly while React boots (replaced on hydration) -->
      <style>
        #app-shell .sh-hero-h1{color:#004D4D;font-weight:800;font-size:50px;line-height:1.4;margin:0 0 20px}
        #app-shell .sh-hero-pad{padding:80px 48px}
        @media(max-width:767px){
          #app-shell .sh-hero-h1{font-size:34px}
          #app-shell .sh-hero-pad{padding:48px 20px}
        }
      </style>
      <div id="app-shell" style="font-family:'DM Sans',system-ui,sans-serif;background:#fff">
        <nav style="background:#fff;border-bottom:1px solid #E5E7EB;position:sticky;top:0;z-index:100;height:64px;display:flex;align-items:center;padding:0 24px">
          <div style="display:flex;align-items:baseline">
            <span style="color:#004D4D;font-weight:800;font-size:18px;letter-spacing:0.04em;text-transform:uppercase">ALTOGETHER</span><span style="color:#FF9715;font-weight:800;font-size:18px;letter-spacing:0.04em;text-transform:uppercase">AGILE</span>
          </div>
        </nav>
        <div style="position:relative;min-height:560px;overflow:hidden">
          <div style="position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden">
            <img src="/images/hero-bg.webp" alt="" fetchpriority="high" width="1380" height="648" style="width:100%;height:100%;object-fit:cover;object-position:center 30%">
          </div>
          <div class="sh-hero-pad" style="position:relative;z-index:2">
            <h1 class="sh-hero-h1">Work better together.<br>Accelerate time to Value.</h1>
            <p style="color:#374151;font-size:16px;line-height:1.7;margin:0 0 32px;max-width:480px">Practical agile training and coaching, grounded in 25 years of real experience. Still delivered personally, every time.</p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
